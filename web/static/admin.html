<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deTilda — Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f4f5; color: #111; }
  header { background: #1e293b; color: #fff; padding: .75rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.1rem; }
  .badge { background: #f59e0b; color: #1e293b; font-size: .7rem; font-weight: 700; padding: .15rem .45rem; border-radius: 4px; letter-spacing: .05em; }
  main { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .75rem; margin-bottom: 1.5rem; }
  .stat { background: #fff; border-radius: 10px; padding: 1rem 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .stat .val { font-size: 1.8rem; font-weight: 700; }
  .stat .lbl { font-size: .8rem; color: #6b7280; margin-top: .15rem; }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.07); margin-bottom: 1.25rem; overflow: hidden; }
  .card-head { padding: .75rem 1.25rem; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; gap: .5rem; flex-wrap: wrap; }
  .card-head h2 { font-size: .95rem; font-weight: 600; }
  .card-head .actions { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { text-align: left; padding: .55rem 1rem; background: #f8fafc; color: #6b7280; font-weight: 500; border-bottom: 1px solid #e2e8f0; }
  td { padding: .55rem 1rem; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .status { display: inline-block; padding: .2rem .55rem; border-radius: 999px; font-size: .75rem; font-weight: 600; }
  .s-pending { background: #fef3c7; color: #92400e; }
  .s-running { background: #dbeafe; color: #1e40af; }
  .s-done    { background: #dcfce7; color: #166534; }
  .s-error   { background: #fee2e2; color: #991b1b; }
  .mono { font-family: monospace; font-size: .8rem; color: #374151; }
  .err-text { color: #dc2626; font-size: .8rem; max-width: 260px; word-break: break-word; }
  button { cursor: pointer; border: none; border-radius: 7px; padding: .4rem .85rem; font-size: .83rem; font-weight: 500; }
  .btn-primary  { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger   { background: #fee2e2; color: #991b1b; }
  .btn-danger:hover { background: #fecaca; }
  .btn-ghost    { background: #eff6ff; color: #1d4ed8; }
  .btn-ghost:hover { background: #dbeafe; }
  .msg { font-size: .8rem; }
  .msg-ok  { color: #166534; }
  .msg-err { color: #dc2626; }
  .table-wrap { overflow-x: auto; }
  .link-btn { background: none; color: #2563eb; padding: 0; border-radius: 0; font-size: .8rem; font-weight: 500; }
  .link-btn:hover { color: #1d4ed8; text-decoration: underline; }
  .link-btn:disabled { color: #9ca3af; cursor: default; text-decoration: none; }
  .pager { display: flex; align-items: center; justify-content: flex-end; gap: .5rem; padding: .7rem 1rem; border-top: 1px solid #f1f5f9; color: #6b7280; font-size: .82rem; flex-wrap: wrap; }
  .pager button { padding: .32rem .65rem; background: #f3f4f6; color: #374151; }
  .pager button:disabled { color: #9ca3af; cursor: default; }
  .pager select { border: 1px solid #d1d5db; border-radius: 6px; padding: .28rem .45rem; background: #fff; color: #374151; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, .48); display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 20; }
  .modal-backdrop[hidden] { display: none; }
  .modal { width: min(900px, 100%); max-height: min(760px, calc(100vh - 2rem)); overflow: hidden; background: #fff; border-radius: 10px; box-shadow: 0 20px 50px rgba(15, 23, 42, .25); display: flex; flex-direction: column; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: .9rem 1rem; border-bottom: 1px solid #e5e7eb; }
  .modal-title { font-size: .95rem; font-weight: 650; }
  .modal-close { width: 32px; height: 32px; padding: 0; background: #f3f4f6; color: #374151; font-size: 1.25rem; line-height: 1; }
  .modal-body { overflow: auto; padding: 1rem; background: #0f172a; }
  .log-view { white-space: pre-wrap; color: #dbeafe; font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  /* Config form */
  .cfg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: .6rem; padding: 1rem 1.25rem; }
  .cfg-item { background: #f8fafc; border-radius: 8px; padding: .65rem .9rem; }
  .cfg-item label { display: block; font-size: .75rem; color: #6b7280; margin-bottom: .3rem; }
  .cfg-item input { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: .35rem .55rem; font-size: .95rem; font-weight: 600; background: #fff; }
  .cfg-item input:focus { outline: 2px solid #2563eb; border-color: transparent; }
  #last-refresh { font-size: .75rem; opacity: .6; margin-left: auto; }
  .err-banner { background: #fee2e2; color: #991b1b; padding: .6rem 1rem; font-size: .85rem; border-radius: 8px; margin-bottom: .75rem; display: none; }
</style>
</head>
<body>
<!-- Auth token injected by server — used for all API calls from this page -->
<script>window._AUTH = 'Basic __ADMIN_TOKEN__';</script>

<header>
  <h1>deTilda Admin</h1>
  <span class="badge">ADMIN</span>
  <span id="version" style="font-size:.8rem"></span>
  <span id="last-refresh"></span>
</header>

<main>
  <div id="err-banner" class="err-banner"></div>

  <div class="grid">
    <div class="stat"><div class="val" id="s-total">—</div><div class="lbl">Всего задач</div></div>
    <div class="stat"><div class="val" id="s-active">—</div><div class="lbl">В обработке</div></div>
    <div class="stat"><div class="val" id="s-done">—</div><div class="lbl">Завершено</div></div>
    <div class="stat"><div class="val" id="s-error">—</div><div class="lbl">С ошибкой</div></div>
  </div>

  <!-- Config -->
  <div class="card">
    <div class="card-head">
      <h2>Конфигурация</h2>
      <div class="actions">
        <button class="btn-primary" id="btn-save">Сохранить</button>
        <span id="save-msg" class="msg"></span>
      </div>
    </div>
    <form id="cfg-form" class="cfg-grid" onsubmit="return false"></form>
  </div>

  <!-- Jobs -->
  <div class="card">
    <div class="card-head">
      <h2>Задачи</h2>
      <div class="actions">
        <button class="btn-danger" id="btn-cleanup">Очистить истёкшие</button>
        <span id="cleanup-msg" class="msg"></span>
        <button class="btn-ghost" id="btn-refresh">Обновить</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Статус</th><th>Создана</th><th>Завершена</th><th>Логи</th><th>Детали</th></tr></thead>
        <tbody id="jobs-body"></tbody>
      </table>
    </div>
    <div class="pager">
      <span id="jobs-range">—</span>
      <button id="jobs-prev" type="button">Назад</button>
      <span id="jobs-page">—</span>
      <button id="jobs-next" type="button">Вперёд</button>
      <label for="jobs-page-size">На странице</label>
      <select id="jobs-page-size">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>
  </div>
</main>

<div id="log-modal" class="modal-backdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="log-title">
    <div class="modal-head">
      <div id="log-title" class="modal-title">Лог операции</div>
      <button id="log-close" class="modal-close" type="button" aria-label="Закрыть">×</button>
    </div>
    <div class="modal-body">
      <pre id="log-content" class="log-view"></pre>
    </div>
  </div>
</div>

<script>
// All API requests use the server-injected auth token
function authFetch(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: { 'Authorization': window._AUTH, ...(opts.headers || {}) },
  });
}

const CFG_FIELDS = [
  { key: 'max_upload_size_mb',      label: 'Макс. размер загрузки (МБ)' },
  { key: 'processing_timeout_sec',  label: 'Таймаут обработки (сек)' },
  { key: 'max_concurrent_jobs',     label: 'Одновременных задач' },
  { key: 'job_ttl_minutes',         label: 'TTL задач (мин)' },
  { key: 'log_ttl_days',            label: 'Хранить логи (дней)' },
  { key: 'rate_limit_per_minute',   label: 'Rate limit (req/мин)' },
];

function statusClass(s) {
  return { pending: 's-pending', running: 's-running', done: 's-done', error: 's-error' }[s] || '';
}
function statusLabel(s) {
  return { pending: 'ожидание', running: 'выполняется', done: 'готово', error: 'ошибка' }[s] || s;
}
function fmt(iso) {
  return iso ? new Date(iso).toLocaleString('ru-RU') : '—';
}
function showMsg(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + cls;
  setTimeout(() => { el.textContent = ''; el.className = 'msg'; }, 4000);
}

let jobsPage = 1;
let jobsPageSize = 20;
let jobsPages = 1;
let jobsTotal = 0;

function renderConfig(cfg) {
  document.getElementById('cfg-form').innerHTML = CFG_FIELDS.map(f => `
    <div class="cfg-item">
      <label for="cfg-${f.key}">${f.label}</label>
      <input id="cfg-${f.key}" type="number" min="1" value="${cfg[f.key] ?? ''}">
    </div>`).join('');
}

async function loadStats() {
  const r = await authFetch('/admin/api/stats');
  if (!r.ok) { showError('Ошибка загрузки статистики: ' + r.status); return; }
  const d = await r.json();
  document.getElementById('version').textContent = 'v' + d.version;
  document.getElementById('s-total').textContent  = d.total_jobs;
  document.getElementById('s-active').textContent = (d.by_status.running || 0) + (d.by_status.pending || 0);
  document.getElementById('s-done').textContent   = d.by_status.done  || 0;
  document.getElementById('s-error').textContent  = d.by_status.error || 0;
  renderConfig(d.config);
}

async function loadJobs() {
  const r = await authFetch(`/admin/api/jobs?page=${jobsPage}&page_size=${jobsPageSize}`);
  if (!r.ok) return;
  const data = await r.json();
  const jobs = data.items || [];
  jobsPage = data.page || 1;
  jobsPageSize = data.page_size || jobsPageSize;
  jobsPages = data.pages || 1;
  jobsTotal = data.total || 0;
  const tbody = document.getElementById('jobs-body');
  if (!jobs.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#9ca3af;padding:1.5rem">Нет задач</td></tr>';
    renderJobsPager();
    return;
  }
  tbody.innerHTML = jobs.map(j => `
    <tr>
      <td class="mono">${j.id.slice(0, 8)}…</td>
      <td><span class="status ${statusClass(j.status)}">${statusLabel(j.status)}</span></td>
      <td>${fmt(j.created_at)}</td>
      <td>${fmt(j.finished_at)}</td>
      <td>${j.log_available
        ? `<button class="link-btn" type="button" data-log-id="${j.id}">открыть</button>`
        : '<span style="color:#9ca3af;font-size:.8rem">нет</span>'}</td>
      <td>${j.status === 'error'
        ? `<span class="err-text" title="${(j.error_detail||'').replace(/"/g,'&quot;')}">${j.error || '—'}</span>`
        : j.status === 'done'
          ? (j.result_available
              ? `<a href="/api/jobs/${j.id}/download" style="color:#2563eb;font-size:.8rem">скачать</a>`
              : '<span style="color:#9ca3af;font-size:.8rem">файл удалён</span>')
          : '—'}</td>
    </tr>`).join('');
  tbody.querySelectorAll('[data-log-id]').forEach(btn => {
    btn.addEventListener('click', () => openLog(btn.dataset.logId));
  });
  renderJobsPager();
}

function renderJobsPager() {
  const start = jobsTotal === 0 ? 0 : (jobsPage - 1) * jobsPageSize + 1;
  const end = Math.min(jobsPage * jobsPageSize, jobsTotal);
  document.getElementById('jobs-range').textContent = jobsTotal ? `${start}–${end} из ${jobsTotal}` : '0 задач';
  document.getElementById('jobs-page').textContent = `${jobsPage} / ${jobsPages}`;
  document.getElementById('jobs-prev').disabled = jobsPage <= 1;
  document.getElementById('jobs-next').disabled = jobsPage >= jobsPages;
  document.getElementById('jobs-page-size').value = String(jobsPageSize);
}

async function openLog(jobId) {
  const modal = document.getElementById('log-modal');
  const title = document.getElementById('log-title');
  const content = document.getElementById('log-content');
  title.textContent = `Лог операции ${jobId.slice(0, 8)}…`;
  content.textContent = 'Загрузка…';
  modal.hidden = false;
  document.getElementById('log-close').focus();

  const r = await authFetch(`/admin/api/jobs/${jobId}/log`);
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    content.textContent = err.detail || `Ошибка загрузки лога: ${r.status}`;
    return;
  }
  const d = await r.json();
  title.textContent = d.filename || title.textContent;
  content.textContent = d.log || '';
}

function closeLog() {
  document.getElementById('log-modal').hidden = true;
}

function showError(msg) {
  const b = document.getElementById('err-banner');
  b.textContent = msg;
  b.style.display = 'block';
  setTimeout(() => { b.style.display = 'none'; }, 6000);
}

async function refresh() {
  await Promise.all([loadStats(), loadJobs()]);
  document.getElementById('last-refresh').textContent =
    'Обновлено: ' + new Date().toLocaleTimeString('ru-RU');
}

document.getElementById('btn-refresh').addEventListener('click', refresh);
document.getElementById('jobs-prev').addEventListener('click', async () => {
  if (jobsPage > 1) {
    jobsPage -= 1;
    await loadJobs();
  }
});
document.getElementById('jobs-next').addEventListener('click', async () => {
  if (jobsPage < jobsPages) {
    jobsPage += 1;
    await loadJobs();
  }
});
document.getElementById('jobs-page-size').addEventListener('change', async event => {
  jobsPageSize = parseInt(event.target.value, 10);
  jobsPage = 1;
  await loadJobs();
});
document.getElementById('log-close').addEventListener('click', closeLog);
document.getElementById('log-modal').addEventListener('click', event => {
  if (event.target.id === 'log-modal') closeLog();
});
document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && !document.getElementById('log-modal').hidden) closeLog();
});

document.getElementById('btn-save').addEventListener('click', async () => {
  const body = {};
  CFG_FIELDS.forEach(f => {
    const el = document.getElementById('cfg-' + f.key);
    if (el && el.value) body[f.key] = parseInt(el.value, 10);
  });
  const r = await authFetch('/admin/api/config', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (r.ok) {
    renderConfig(await r.json());
    showMsg('save-msg', 'Сохранено ✓', 'msg-ok');
  } else {
    const err = await r.json().catch(() => ({}));
    showMsg('save-msg', err.detail || 'Ошибка', 'msg-err');
  }
});

document.getElementById('btn-cleanup').addEventListener('click', async () => {
  const r = await authFetch('/admin/api/cleanup', { method: 'POST' });
  const d = await r.json();
  showMsg('cleanup-msg', `Задач: ${d.removed_jobs}, логов: ${d.removed_logs}`, 'msg-ok');
  await refresh();
});

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
