<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deTilda</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f4f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding: 1rem; }
  .card { background: #fff; border-radius: 14px; box-shadow: 0 2px 16px rgba(0,0,0,.08); padding: 2rem; width: min(500px, 100%); }
  .title-row { display: flex; align-items: center; gap: .6rem; margin-bottom: .25rem; flex-wrap: wrap; }
  h1 { font-size: 1.5rem; margin: 0; }
  .sub { color: #6b7280; font-size: .9rem; margin-bottom: 1.75rem; }
  label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: .3rem; margin-top: 1.1rem; }
  input[type=email], input[type=file] { width: 100%; padding: .55rem .75rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: .95rem; }
  .btn-primary { margin-top: 1.25rem; width: 100%; padding: .65rem; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 500; }
  .btn-primary:disabled { background: #9ca3af; cursor: default; }
  .btn-success { display: none; width: 100%; padding: .65rem; background: #16a34a; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 500; text-align: center; text-decoration: none; margin-top: .75rem; }
  .btn-ghost { display: none; width: 100%; padding: .6rem; background: #f3f4f6; color: #374151; border: none; border-radius: 8px; font-size: .9rem; cursor: pointer; margin-top: .5rem; }

  /* Status line */
  #status { margin-top: 1rem; font-size: .9rem; color: #374151; min-height: 1.4rem; display: flex; align-items: center; gap: .4rem; }
  #status.err { color: #dc2626; }
  .err-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: .75rem 1rem; margin-top: 1rem; }
  .err-box .err-msg { color: #dc2626; font-size: .9rem; font-weight: 500; }
  .err-box .err-hint { color: #6b7280; font-size: .82rem; margin-top: .3rem; }
  .spinner { width: 14px; height: 14px; border: 2px solid #d1d5db; border-top-color: #2563eb; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Stats block */
  #stats-block { display: none; margin-top: 1.25rem; border-top: 1px solid #f1f5f9; padding-top: 1rem; }
  .stats-title { font-size: .8rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .65rem; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-radius: 7px; padding: .35rem .65rem; font-size: .85rem; }
  .stat-row.clickable { cursor: pointer; border: 1px solid transparent; }
  .stat-row.clickable:hover, .stat-row.clickable:focus-visible { background: #eef2ff; border-color: #c7d2fe; outline: none; }
  .stat-row .k { color: #6b7280; }
  .stat-row .v { font-weight: 600; color: #111; }
  .stat-row.warn .v { color: #d97706; }
  .stat-row.bad  .v { color: #dc2626; }
  .stat-time { margin-top: .5rem; font-size: .78rem; color: #9ca3af; text-align: right; }

  /* Details modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, .42); display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 20; }
  .modal-backdrop[hidden] { display: none; }
  .modal { width: min(560px, 100%); max-height: min(680px, calc(100vh - 2rem)); overflow: hidden; background: #fff; border-radius: 12px; box-shadow: 0 20px 50px rgba(15, 23, 42, .25); display: flex; flex-direction: column; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 1rem 1.1rem; border-bottom: 1px solid #e5e7eb; }
  .modal-title { font-size: 1rem; font-weight: 650; color: #111827; }
  .modal-close { width: 32px; height: 32px; border: 0; border-radius: 7px; background: #f3f4f6; color: #374151; font-size: 1.25rem; line-height: 1; cursor: pointer; }
  .modal-close:hover, .modal-close:focus-visible { background: #e5e7eb; outline: none; }
  .modal-body { overflow: auto; padding: 1rem 1.1rem; }
  .detail-list { display: grid; gap: .45rem; list-style: none; }
  .detail-list li { background: #f8fafc; border: 1px solid #eef2f7; border-radius: 7px; padding: .55rem .7rem; color: #374151; font-size: .86rem; line-height: 1.35; word-break: break-word; }

  /* Progress steps */
  #progress-block { display: none; margin-top: 1rem; border-top: 1px solid #f1f5f9; padding-top: .85rem; }
  .progress-title { font-size: .73rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .5rem; }
  .progress-steps { display: grid; grid-template-columns: 1fr 1fr; gap: .1rem 0; }
  .step-row { display: flex; align-items: center; gap: .4rem; padding: .18rem 0; font-size: .8rem; color: #c4c9d4; }
  .step-row.s-done   { color: #374151; }
  .step-row.s-active { color: #2563eb; }
  .step-icon { width: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .step-mini-spin { width: 9px; height: 9px; border: 1.5px solid #bfdbfe; border-top-color: #2563eb; border-radius: 50%; animation: spin .75s linear infinite; }
  .batch-list { display: none; margin-top: 1rem; border-top: 1px solid #f1f5f9; padding-top: .8rem; }
  .batch-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: .5rem; align-items: center; padding: .5rem 0; border-bottom: 1px solid #f8fafc; }
  .batch-row:last-child { border-bottom: 0; }
  .batch-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: .86rem; color: #374151; }
  .batch-state { font-size: .78rem; color: #6b7280; }
  .batch-link { color: #2563eb; text-decoration: none; font-size: .82rem; font-weight: 600; }
  .batch-link:hover { text-decoration: underline; }
  .site-footer { width: min(500px, 100%); color: #6b7280; font-size: .8rem; text-align: center; letter-spacing: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="title-row">
    <h1>deTilda v__APP_VERSION__</h1>
  </div>
  <p class="sub">Обработка Tilda ZIP-экспорта для самостоятельного хостинга</p>

  <form id="form">
    <label for="file">ZIP-архив экспорта Tilda</label>
    <input type="file" id="file" name="file" accept=".zip" multiple required>
    <label for="email">Email для форм <span style="color:#9ca3af;font-weight:400">(необязательно)</span></label>
    <input type="email" id="email" name="email" placeholder="owner@example.com">
    <button type="submit" class="btn-primary" id="btn">Обработать</button>
  </form>

  <div id="status"></div>
  <div id="batch-list" class="batch-list"></div>
  <div id="progress-block">
    <div class="progress-title">Шаги обработки</div>
    <div class="progress-steps" id="progress-steps"></div>
  </div>
  <div id="err-box" class="err-box" style="display:none">
    <div id="err-msg" class="err-msg"></div>
    <div id="err-hint" class="err-hint"></div>
  </div>

  <div id="stats-block">
    <div class="stats-title">Результат обработки</div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="stat-time" id="stat-time"></div>
  </div>

  <a  id="download" class="btn-success" href="#">Скачать результат</a>
  <button id="btn-again" class="btn-ghost">Обработать ещё</button>
</div>
<footer class="site-footer">made with &hearts; by Roman A. Proskurnin</footer>

<div id="details-modal" class="modal-backdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="details-title">
    <div class="modal-head">
      <div id="details-title" class="modal-title"></div>
      <button id="details-close" class="modal-close" type="button" aria-label="Закрыть">×</button>
    </div>
    <div class="modal-body">
      <ul id="details-list" class="detail-list"></ul>
    </div>
  </div>
</div>

<script>
const form      = document.getElementById('form');
const btn       = document.getElementById('btn');
const statusEl  = document.getElementById('status');
const downloadEl = document.getElementById('download');
const btnAgain  = document.getElementById('btn-again');
const statsBlock = document.getElementById('stats-block');
const statsGrid  = document.getElementById('stats-grid');
const statTime   = document.getElementById('stat-time');
const errBox    = document.getElementById('err-box');
const errMsg    = document.getElementById('err-msg');
const errHint   = document.getElementById('err-hint');
const batchList = document.getElementById('batch-list');
const detailsModal = document.getElementById('details-modal');
const detailsTitle = document.getElementById('details-title');
const detailsList  = document.getElementById('details-list');
const detailsClose = document.getElementById('details-close');

let currentStats = null;

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]));
}

const STEPS = [
  { id: 'assets',          label: 'Ассеты' },
  { id: 'page404',         label: 'Страница 404' },
  { id: 'cleaners',        label: 'Очистка' },
  { id: 'forms',           label: 'Обработчик форм' },
  { id: 'inject',          label: 'Скрипты форм' },
  { id: 'font_substitute', label: 'Замена шрифтов' },
  { id: 'fonts',           label: 'Google Fonts' },
  { id: 'refs',            label: 'Ссылки' },
  { id: 'cdn_localizer',   label: 'Локализация CDN' },
  { id: 'cdn_cleanup',     label: 'Очистка CDN' },
  { id: 'images',          label: 'Изображения' },
  { id: 'script_cleaner',  label: 'Tilda-скрипты' },
  { id: 'forms_check',     label: 'Проверка форм' },
  { id: 'html_prettify',   label: 'HTML-форматирование' },
  { id: 'checker',         label: 'Проверка ссылок' },
  { id: 'tilda-remnants',  label: 'Остатки Tilda' },
  { id: 'report',          label: 'Отчёт' },
];

function renderProgress(completedSteps) {
  const done = new Set(completedSteps || []);
  let activeIdx = STEPS.findIndex(s => !done.has(s.id));
  document.getElementById('progress-steps').innerHTML = STEPS.map((s, i) => {
    const isDone = done.has(s.id);
    const isActive = i === activeIdx;
    const cls = isDone ? 's-done' : (isActive ? 's-active' : '');
    const icon = isDone
      ? '<span style="color:#16a34a;font-size:.75rem">✓</span>'
      : (isActive ? '<span class="step-mini-spin"></span>' : '<span style="color:#e5e7eb;font-size:.9rem">·</span>');
    return `<div class="step-row ${cls}"><span class="step-icon">${icon}</span><span>${s.label}</span></div>`;
  }).join('');
}

function setStatus(text, spinning, isErr) {
  statusEl.className = isErr ? 'err' : '';
  statusEl.innerHTML = spinning
    ? `<span class="spinner"></span>${text}`
    : text;
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  btn.disabled = true;
  downloadEl.style.display = 'none';
  btnAgain.style.display = 'none';
  batchList.style.display = 'none';
  batchList.innerHTML = '';
  statsBlock.style.display = 'none';
  errBox.style.display = 'none';
  setStatus('Загрузка файла…', true, false);

  const fd = new FormData(form);
  let resp;
  try {
    resp = await fetch('/api/jobs', { method: 'POST', body: fd });
  } catch {
    setStatus('Ошибка сети', false, true);
    btn.disabled = false;
    return;
  }

  if (!resp.ok) {
    const d = await resp.json().catch(() => ({}));
    setStatus(d.detail || `Ошибка ${resp.status}`, false, true);
    btn.disabled = false;
    return;
  }

  const body = await resp.json();
  const jobs = body.jobs || [{ job_id: body.job_id, filename: document.getElementById('file').files[0]?.name || 'archive.zip' }];
  if (jobs.length > 1) {
    setStatus(`Поставлено в обработку: ${jobs.length}`, true, false);
    batchList.style.display = 'block';
    jobs.forEach(job => {
      const row = document.createElement('div');
      row.className = 'batch-row';
      row.id = `job-row-${job.job_id}`;
      row.innerHTML = `
        <div>
          <div class="batch-name">${escapeHtml(job.filename || job.job_id)}</div>
          <div class="batch-state">ожидание</div>
        </div>
        <div></div>`;
      batchList.appendChild(row);
      poll(job.job_id, { row, batch: true });
    });
  } else {
    poll(jobs[0].job_id, { batch: false });
  }
});

const progressBlock = document.getElementById('progress-block');


async function poll(jobId, opts = {}) {
  const isBatch = Boolean(opts.batch);
  const row = opts.row || null;
  if (!isBatch) {
    setStatus('Обработка сайта…', true, false);
    progressBlock.style.display = 'block';
    renderProgress([]);
  }
  const interval = setInterval(async () => {
    let data;
    try {
      const r = await fetch(`/api/jobs/${jobId}`);
      data = await r.json();
    } catch { return; }

    if (data.progress && !isBatch) renderProgress(data.progress);
    if (row) {
      const state = row.querySelector('.batch-state');
      if (state) state.textContent = statusLabel(data.status);
    }

    if (data.status === 'done') {
      clearInterval(interval);
      if (isBatch && row) {
        row.querySelector('.batch-state').textContent = 'готово';
        row.lastElementChild.innerHTML = `<a class="batch-link" href="/api/jobs/${jobId}/download">скачать</a>`;
        finishBatchIfDone();
      } else {
        setStatus('', false, false);
        progressBlock.style.display = 'none';
        showStats(data.stats);
        downloadEl.href = `/api/jobs/${jobId}/download`;
        downloadEl.style.display = 'block';
        btnAgain.style.display = 'block';
        btn.disabled = false;
      }
    } else if (data.status === 'error') {
      clearInterval(interval);
      if (isBatch && row) {
        row.querySelector('.batch-state').textContent = data.error || 'ошибка';
        row.querySelector('.batch-state').style.color = '#dc2626';
        finishBatchIfDone();
      } else {
        progressBlock.style.display = 'none';
        showError(data.error, data.error_code);
        btnAgain.style.display = 'block';
        btn.disabled = false;
      }
    }
  }, 2000);
}

function statusLabel(s) {
  return { pending: 'ожидание', running: 'обработка', done: 'готово', error: 'ошибка' }[s] || s || 'ожидание';
}

function finishBatchIfDone() {
  const states = [...batchList.querySelectorAll('.batch-state')].map(el => el.textContent);
  const done = states.every(text => text === 'готово' || text.includes('ошибка'));
  if (!done) return;
  setStatus('', false, false);
  btnAgain.style.display = 'block';
  btn.disabled = false;
}

const ERROR_HINTS = {
  invalid_zip:    'Скачайте архив заново через Tilda: Настройки сайта → Экспорт → Скачать.',
  empty_archive:  'Убедитесь что экспортировали полный сайт, а не отдельную страницу.',
  unpack_failed:  'Проверьте что загружен ZIP-экспорт Tilda, а не другой архив.',
  pipeline_error: 'Попробуйте загрузить архив снова. Если ошибка повторяется — обратитесь в поддержку.',
  unknown:        'Попробуйте позже или обратитесь в поддержку.',
};

function showError(msg, code) {
  errMsg.textContent  = msg || 'Произошла ошибка при обработке.';
  errHint.textContent = ERROR_HINTS[code] || ERROR_HINTS.unknown;
  errBox.style.display = 'block';
}

function showStats(s) {
  if (!s) return;
  currentStats = s;
  const rows = [
    { key: 'renamed_assets', k: 'Переименовано файлов', v: s.renamed_assets,  cls: '' },
    { key: 'fixed_links',    k: 'Исправлено ссылок',    v: s.fixed_links,     cls: '' },
    { key: 'downloaded',     k: 'Загружено с CDN',      v: s.downloaded,      cls: '' },
    { key: 'forms_hooked',   k: 'Форм подключено',      v: s.forms_hooked,    cls: '' },
    { key: 'warnings',       k: 'Предупреждений',       v: s.warnings,        cls: s.warnings  > 0 ? 'warn' : '' },
    { key: 'errors',         k: 'Ошибок',               v: s.errors,          cls: s.errors    > 0 ? 'bad'  : '' },
  ];
  statsGrid.innerHTML = rows.map(r => `
    <div class="stat-row clickable ${r.cls}" role="button" tabindex="0" data-detail-key="${r.key}" aria-label="${r.k}: открыть детали">
      <span class="k">${r.k}</span>
      <span class="v">${r.v}</span>
    </div>`).join('');
  statsGrid.querySelectorAll('.stat-row').forEach(row => {
    row.addEventListener('click', () => openDetails(row.dataset.detailKey));
    row.addEventListener('keydown', event => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        openDetails(row.dataset.detailKey);
      }
    });
  });
  if (s.exec_time) {
    statTime.textContent = `Время обработки: ${s.exec_time} сек`;
  }
  statsBlock.style.display = 'block';
}

function openDetails(key) {
  const detail = currentStats?.details?.[key] || {};
  const items = Array.isArray(detail.items) && detail.items.length
    ? detail.items
    : ['Подробной информации для этого поля нет.'];

  detailsTitle.textContent = detail.title || 'Детали';
  detailsList.innerHTML = '';
  items.forEach(item => {
    const li = document.createElement('li');
    li.textContent = String(item);
    detailsList.appendChild(li);
  });
  detailsModal.hidden = false;
  detailsClose.focus();
}

function closeDetails() {
  detailsModal.hidden = true;
}

detailsClose.addEventListener('click', closeDetails);
detailsModal.addEventListener('click', event => {
  if (event.target === detailsModal) closeDetails();
});
document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && !detailsModal.hidden) closeDetails();
});

btnAgain.addEventListener('click', () => {
  form.reset();
  currentStats = null;
  closeDetails();
  batchList.style.display = 'none';
  batchList.innerHTML = '';
  statsBlock.style.display = 'none';
  errBox.style.display = 'none';
  progressBlock.style.display = 'none';
  downloadEl.style.display = 'none';
  btnAgain.style.display = 'none';
  setStatus('', false, false);
});
</script>
</body>
</html>
