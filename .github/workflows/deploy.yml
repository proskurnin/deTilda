name: Test & Deploy

on:
  push:
    branches: [main, prod]
  pull_request:
    branches: [main, prod]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -q

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -eu
            cd /home/deploy/staging
            sudo chown -R "$(id -u):$(id -g)" /home/deploy/staging
            sudo rm -f /tmp/detilda.env.staging
            if [ -f .env.staging ]; then
              cp .env.staging /tmp/detilda.env.staging
            elif [ -f /home/deploy/.env.staging ]; then
              cp /home/deploy/.env.staging /tmp/detilda.env.staging
            elif [ -f /home/deploy/secrets/.env.staging ]; then
              cp /home/deploy/secrets/.env.staging /tmp/detilda.env.staging
            fi
            rm -f .env.staging
            git fetch --prune origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            if [ ! -f /tmp/detilda.env.staging ]; then
              echo "Missing .env.staging on server. Put it in /home/deploy/.env.staging or /home/deploy/secrets/.env.staging."
              exit 1
            fi
            cp /tmp/detilda.env.staging .env.staging
            chmod 600 .env.staging
            docker compose -f docker-compose.staging.yml up -d --build --force-recreate
            docker image prune -f
            sudo cp nginx/staging.conf /etc/nginx/sites-available/detilda.proskurnin.com
            sudo nginx -t && sudo systemctl reload nginx
            for i in 1 2 3 4 5; do
              if curl --fail --silent --show-error http://127.0.0.1:8000/health; then
                break
              fi
              if [ "$i" = "5" ]; then
                exit 1
              fi
              sleep 2
            done

  deploy-prod:
    needs: test
    if: github.ref == 'refs/heads/prod' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -eu
            cd /home/deploy/prod
            sudo chown -R "$(id -u):$(id -g)" /home/deploy/prod
            sudo rm -f /tmp/detilda.env.prod
            if [ -f .env.prod ]; then
              cp .env.prod /tmp/detilda.env.prod
            elif [ -f /home/deploy/.env.prod ]; then
              cp /home/deploy/.env.prod /tmp/detilda.env.prod
            elif [ -f /home/deploy/secrets/.env.prod ]; then
              cp /home/deploy/secrets/.env.prod /tmp/detilda.env.prod
            fi
            rm -f .env.prod
            git fetch --prune origin prod
            git checkout -B prod origin/prod
            git reset --hard origin/prod
            if [ ! -f /tmp/detilda.env.prod ]; then
              echo "Missing .env.prod on server. Put it in /home/deploy/.env.prod or /home/deploy/secrets/.env.prod."
              exit 1
            fi
            cp /tmp/detilda.env.prod .env.prod
            chmod 600 .env.prod
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate
            docker image prune -f
            sudo cp nginx/prod.conf /etc/nginx/sites-available/detilda.com
            sudo nginx -t && sudo systemctl reload nginx
            for i in 1 2 3 4 5; do
              if curl --fail --silent --show-error http://127.0.0.1:8001/health; then
                break
              fi
              if [ "$i" = "5" ]; then
                exit 1
              fi
              sleep 2
            done
