name: Test & Deploy

on:
  push:
    branches: [main, prod]
  pull_request:
    branches: [main, prod]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -q

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -eu
            cd /home/deploy/staging
            sudo chown -R "$(id -u):$(id -g)" /home/deploy/staging
            git fetch --prune origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            docker compose -f docker-compose.staging.yml up -d --build --force-recreate
            docker image prune -f
            sudo cp nginx/staging.conf /etc/nginx/sites-available/detilda.proskurnin.com
            sudo nginx -t && sudo systemctl reload nginx
            for i in 1 2 3 4 5; do
              if curl --fail --silent --show-error http://127.0.0.1:8000/health; then
                break
              fi
              if [ "$i" = "5" ]; then
                exit 1
              fi
              sleep 2
            done

  deploy-prod:
    needs: test
    if: github.ref == 'refs/heads/prod' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -eu
            cd /home/deploy/prod
            sudo chown -R "$(id -u):$(id -g)" /home/deploy/prod
            git fetch --prune origin prod
            git checkout -B prod origin/prod
            git reset --hard origin/prod
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate
            docker image prune -f
            for i in 1 2 3 4 5; do
              if curl --fail --silent --show-error http://127.0.0.1:8000/health; then
                break
              fi
              if [ "$i" = "5" ]; then
                exit 1
              fi
              sleep 2
            done
