name: tests

# Когда запускать: при push в master и при открытии PR на master
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    # Переход на Node.js 24 — Node.js 20 устарел в actions runner
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      # Скачиваем код репозитория
      - uses: actions/checkout@v4

      # Ставим Python (3.13 — как в .venv разработчика)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      # Ставим зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Запускаем тесты
      - name: Run tests
        run: python -m pytest tests/ -v
