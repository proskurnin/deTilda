name: tests

# Когда запускать: при push в main и при открытии PR на main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Скачиваем код репозитория
      - uses: actions/checkout@v4

      # Ставим Python (3.13 — как в .venv разработчика)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      # Ставим зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Запускаем тесты
      - name: Run tests
        run: python -m pytest tests/ -v
