# deTilda — unified configuration
#
# Четыре секции:
#   patterns      — regex для поиска ссылок, замен текста и очистки файлов
#   images        — правила обработки изображений и иконок Tilda
#   service_files — управление скриптами, ресурсами и настройки шагов конвейера
#   forms         — настройки send_email.php и smoke-теста форм

patterns:
  # Regex для поиска ссылок в HTML/CSS/JS — используются в refs.py и checker.py
  links:
    - "(?i)\\b(?:src|href|action)\\s*=\\s*[\"''](?P<link>[^\"'']+)[\"'']"
    - "(?i)\\burl\\(([\"'']?)(?P<link>[^) \"'']+)\\1\\)"
    - "(?i)\\bsrcset\\s*=\\s*[\"''](?P<link>[^\"'']+)[\"'']"
    - "(?i)\\bdata-src\\s*=\\s*[\"''](?P<link>[^\"'']+)[\"'']"

  # Замены текста по всему проекту — применяются в refs.py
  # til → ai переименовывает классы/файлы Tilda в нейтральные.
  # Negative lookahead защищает Microsoft-стандарт msapplication-TileColor /
  # msapplication-TileImage — это не Tilda-наследие, ломать нельзя.
  replace_rules:
    - pattern: "(?i)\\btil(?!eColor\\b|eImage\\b)"
      replacement: "ai"
    - pattern: "(?i)\\bt-"
      replacement: "ai-"

  # Расширения файлов, в которых ищем и заменяем ссылки
  text_extensions:
    - ".html"
    - ".htm"
    - ".css"
    - ".js"
    - ".php"
    - ".txt"

  # Ссылки с этими префиксами не трогаем (внешние URL, data-uri, якори)
  ignore_prefixes:
    - "http://"
    - "https://"
    - "//"
    - "data:"
    - "mailto:"
    - "tel:"
    - "#"

  # Строки, удаляемые из robots.txt — служебные пути Tilda
  robots_cleanup_patterns:
    - "(?im)^\\s*Disallow:\\s*/tilda/(?:form|rec|click|scroll|popup|cart|product|event).*\\n?"
    - "(?im)^\\s*Disallow:\\s*/\\*_escaped_fragment_\\*/\\s*\\n?"

  # Строки, удаляемые или заменяемые в readme.txt
  readme_cleanup_patterns:
    - "(?im)^.*Published on Tilda\\.cc.*\\n?"
    - pattern: "(?i)\\btilda\\b"
      replacement: "site"

  # Regex для парсинга .htaccess — используется в htaccess.py
  htaccess_patterns:
    rewrite_rule: "(?im)^[ \\t]*RewriteRule[ \\t]+\\^/?([a-z0-9\\-\\_\\/]+)\\??\\$[ \\t]+([^\\s\\[]+)"
    redirect: "(?im)^[ \\t]*Redirect(?:Permanent|[ \\t]+3\\d{2})?[ \\t]+(/[^\\s]+)[ \\t]+([^\\s]+)"
    # Если маршрут из .htaccess ведёт в несуществующий файл — редиректить на 404
    soft_fallback_to_404: false
    # Автоматически создавать заглушку для отсутствующего файла маршрута
    auto_stub_missing_routes: true
    # Удалять маршруты из .htaccess если файл назначения не найден
    remove_unresolved_routes: true
    fallback_target: "404.html"

  # Паттерн переименования файлов: til → ai в именах файлов (assets.py)
  assets:
    til_to_ai_filename: "\\btil"

  # Regex для поиска оставшихся ссылок на домены Tilda — используется в cleaners.py
  tilda_remnants_patterns:
    - "(https?://|//)[^\\s'\"]*tilda\\.ws[^\\s'\"]*"
    - "(https?://|//)[^\\s'\"]*tildacdn\\.com[^\\s'\"]*"
    - "(https?://|//)[^\\s'\"]*tildaapi\\.com[^\\s'\"]*"

images:
  # Физическое удаление файлов сразу под оригинальным именем — assets.py
  # Нет смысла сначала переименовывать мусорные файлы Tilda, а потом удалять —
  # удаляем сразу по имени как они приходят в экспорте
  delete_physical_files:
    as_is:
      - "tildacopy.png"
      - "tildacopy_black.png"
      - "tildafavicon.ico"
      - "aidacopy.png"
      - "aidacopy_black.png"
      - "aidafavicon.ico"
      - "logo404.png"

  # Ссылки на эти файлы комментируются в HTML (<!-- ... -->)
  comment_out_links:
    patterns:
      - "tildacopy.png"
      - "tildacopy_black.png"
      - "aidacopy.png"
      - "aidacopy_black.png"
      - "aidafavicon.ico"
      - "logo404.png"
      - "tilda.ws/img/logo404.png"

  # Теги <link rel="icon"> и <link rel="apple-touch-icon"> комментируются —
  # Tilda подставляет свои иконки, мы их убираем
  comment_out_link_tags:
    rel_values:
      - "icon"
      - "apple-touch-icon"
      - "apple-touch-icon-precomposed"

  # Ссылки на логотипы Tilda заменяются на прозрачный 1px-пиксель
  replace_links_with_1px:
    patterns:
      - "tilda.ws/img/logo404.png"
      - "tildacopy.png"
      - "tildacopy_black.png"

service_files:
  # Правила скачивания удалённых ресурсов с CDN Tilda — assets.py
  # CSS → папка css/, JS → js/, картинки → images/
  remote_assets:
    scan_extensions:
      - ".html"
      - ".htm"
      - ".css"
      - ".js"
      - ".php"
      - ".txt"
    rules:
      - folder: "css"
        extensions:
          - ".css"
      - folder: "js"
        extensions:
          - ".js"
      - folder: "images"
        extensions:
          - ".png"
          - ".jpg"
          - ".jpeg"
          - ".gif"
          - ".svg"
          - ".ico"

  # Файлы, которые не переименовываются при нормализации — assets.py
  exclude_from_rename:
    files:
      - "robots.txt"
      - "sitemap.xml"
      - "send_email.php"
      - ".htaccess"
      - "htaccess"

  # Физическое удаление JS-файлов Tilda из папки проекта — assets.py
  # Удаляет сами файлы, а не теги в HTML
  scripts_to_delete:
    files:
      - "aida-stat-1.0.min.js"
      - "tilda-stat-1.0.min.js"
      - "aida-forms-1.0.min.js"
      - "aida-fallback-1.0.min.js"
      - "aida-events-1.0.min.js"

  # Удаление тегов <script src="..."> из HTML — script_cleaner.py
  # Оба префикса (tilda-* и aida-*) нужны: Tilda переименовывала свои скрипты,
  # поэтому в разных экспортах встречаются оба варианта
  scripts_to_remove_from_project:
    filenames:
      - "tilda-stat-1.0.min.js"
      - "tilda-forms-1.0.min.js"
      - "tilda-fallback-1.0.min.js"
      - "tilda-events-1.0.min.js"
      - "aida-stat-1.0.min.js"
      - "aida-forms-1.0.min.js"
      - "aida-fallback-1.0.min.js"
      - "aida-events-1.0.min.js"

  # Что вставляется в HTML и куда — inject.py
  # form-handler.js добавляется перед </body>, ga.js перед </head>
  html_inject_options:
    inject_handler_script: "form-handler.js"
    inject_after_marker: "</body>"
    inject_head_scripts:
      - "ga.js"
    inject_head_marker: "</head>"

  # Настройки нормализации регистра имён файлов — assets.py
  pipeline_stages:
    normalize_case:
      enabled: true
      extensions:
        - ".html"
        - ".htm"
        - ".css"
        - ".js"
        - ".php"
        - ".txt"

  # Файлы, в которых удаляются остаточные ссылки на Tilda — cleaners.py
  cleaner_options:
    files_to_clean_tilda_refs:
      - "robots.txt"
      - "readme.txt"

  # Куда сохраняется карта переименований после обработки — assets.py
  rename_map_output:
    filename: "{project}_rename_map.json"
    location: "logs"

  # Файлы из resources/, которые копируются в проект — assets.py
  # if_missing: true — не перетирать если файл уже есть (пользовательский фолбэк)
  resource_copy:
    files:
      - source: "favicon.ico"
        destination: "images/favicon.ico"
        originals:
          - "images/tildafavicon.ico"
          - "tildafavicon.ico"
      # Корневой /favicon.ico — Tilda обычно вставляет
      # <link rel="shortcut icon" href="/favicon.ico">; если архив без этого
      # файла, кладём наш дефолт. Если у пользователя свой favicon в корне —
      # не трогаем.
      - source: "favicon.ico"
        destination: "favicon.ico"
        if_missing: true
      - source: "ga.js"
        destination: "js/ga.js"

font_substitute:
  # Семейство шрифта для замены TildaSans/AidaSans.
  # Должен быть доступен в Google Fonts (fonts_localizer скачает его локально).
  family: "Manrope"
  # @import-строка которая вставляется в CSS вместо Tilda Sans bundle.
  import_url: "@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap');\n"

forms:
  # Получатели тестовых писем send_email.php — срабатывает когда в форме
  # поле Name содержит слово "test". Подставляются в const TEST_RECIPIENTS
  # при копировании resources/send_email.php в проект (forms.py).
  # Этот же список использует tools/smoke_test_form.py для проверки
  # работоспособности формы после деплоя.
  test_recipients:
    - "r@prororo.com"
