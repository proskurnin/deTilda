server {
    server_name detilda.com detilda.ru;

    # Allow uploads up to 100 MB at nginx level.
    # The application enforces its own limit (default 50 MB, configurable in admin).
    client_max_body_size 100m;

    # Generous timeouts: upload of a large ZIP can take a while on slow connections.
    client_body_timeout 120s;
    proxy_read_timeout  180s;
    proxy_send_timeout  120s;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/detilda.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/detilda.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = detilda.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = detilda.ru) {
        return 301 https://$host$request_uri;
    }

    listen      80;
    server_name detilda.com detilda.ru;
    return      404;
}
